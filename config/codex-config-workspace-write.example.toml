# Workspace-write configuration with explicit writable roots.
# This is a safer starting point than danger-full-access.
#
# Note: depending on Codex behavior and your shell/config parser, "~" may
# need to be expanded to an absolute path. Verify the config before relying
# on it for handover publishing.

approval_policy = { granular = { sandbox_approval = true, rules = false, mcp_elicitations = false, request_permissions = false, skill_approval = false } }
sandbox_mode = "workspace-write"

[sandbox_workspace_write]
writable_roots = [
  "~/repos/codex-sync"
]
network_access = true

